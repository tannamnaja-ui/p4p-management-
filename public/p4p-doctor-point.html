<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูล p4p_doctor_point - P4P System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-gradient-to-r from-purple-600 to-purple-800 text-white shadow-lg">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <a href="p4p-import.html"
                    class="bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-3 py-2 rounded-lg transition text-sm">
                    <i class="fas fa-arrow-left mr-1"></i>กลับ
                </a>
                <div>
                    <h1 class="text-2xl font-bold"><i class="fas fa-table mr-2"></i>ข้อมูล p4p_doctor_point</h1>
                    <p class="text-purple-200 text-sm mt-0.5">รายการข้อมูลที่นำเข้าระบบ P4P</p>
                </div>
            </div>
            <div id="userBar" class="hidden"></div>
        </div>
    </header>

    <main class="flex-1 container mx-auto px-6 py-8 max-w-7xl">

        <!-- Alert -->
        <div id="alert" class="hidden mb-6"></div>

        <!-- Filter -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <div class="flex flex-col md:flex-row md:items-end gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-filter text-purple-500 mr-1"></i>เลือก Income (ถ้าไม่เลือกจะแสดงทั้งหมด)
                    </label>
                    <select id="incomeFilter"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        <option value="">-- แสดงทั้งหมด --</option>
                    </select>
                </div>
                <button onclick="loadData()"
                    class="bg-purple-600 hover:bg-purple-700 text-white font-semibold px-6 py-3 rounded-lg transition flex items-center space-x-2">
                    <i class="fas fa-search"></i>
                    <span>ค้นหา</span>
                </button>
                <button onclick="exportCSV()"
                    class="bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-3 rounded-lg transition flex items-center space-x-2">
                    <i class="fas fa-file-csv"></i>
                    <span>Export CSV</span>
                </button>
            </div>
        </div>

        <!-- Data Table -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <div id="dataSection">
                <div class="text-center py-16 text-gray-400">
                    <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
                    <p>กำลังโหลดข้อมูล...</p>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-gray-800 text-white text-center py-4 mt-8">
        <p class="text-sm">P4P Management System v1.0 | โรงพยาบาลพุทธชินราช</p>
    </footer>

    <!-- Edit Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-60 items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4">
            <div class="bg-gradient-to-r from-blue-600 to-blue-800 text-white px-6 py-4 rounded-t-2xl flex items-center justify-between">
                <div>
                    <h3 class="text-lg font-bold"><i class="fas fa-edit mr-2"></i>แก้ไขรายการ</h3>
                    <p class="text-blue-200 text-xs mt-0.5">รหัส: <span id="editIcodeLabel" class="font-mono font-bold"></span></p>
                </div>
                <button onclick="closeEditModal()" class="text-white hover:text-blue-200 text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="editIcode">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1"><i class="fas fa-star text-yellow-500 mr-1"></i>Point</label>
                    <input id="editPoint" type="number" step="0.01" min="0"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm"
                        placeholder="กรอกค่า Point">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1"><i class="fas fa-toggle-on text-green-500 mr-1"></i>สถานะ</label>
                    <select id="editIstatus" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
                        <option value="Y">Active (เปิดใช้งาน)</option>
                        <option value="N">Inactive (ปิดใช้งาน)</option>
                    </select>
                </div>
            </div>
            <div class="px-6 pb-6 flex space-x-3">
                <button onclick="closeEditModal()"
                    class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-lg transition text-sm">
                    ยกเลิก
                </button>
                <button id="saveEditBtn" onclick="saveEdit()"
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition text-sm">
                    <i class="fas fa-save mr-2"></i>บันทึก
                </button>
            </div>
        </div>
    </div>

    <!-- Log Modal -->
    <div id="logModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-60 items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 max-h-[80vh] flex flex-col">
            <div class="bg-gradient-to-r from-amber-500 to-amber-600 text-white px-6 py-4 rounded-t-2xl flex items-center justify-between flex-shrink-0">
                <div>
                    <h3 class="text-lg font-bold"><i class="fas fa-history mr-2"></i>ประวัติการแก้ไข</h3>
                    <p class="text-amber-100 text-xs mt-0.5">รหัส: <span id="logIcodeLabel" class="font-mono font-bold"></span></p>
                </div>
                <button onclick="closeLogModal()" class="text-white hover:text-amber-200 text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div id="logContent" class="p-6 overflow-y-auto flex-1"></div>
            <div class="px-6 pb-4 flex-shrink-0 text-right border-t pt-4">
                <button onclick="closeLogModal()"
                    class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-2 rounded-lg text-sm transition">
                    <i class="fas fa-times mr-2"></i>ปิด
                </button>
            </div>
        </div>
    </div>

    <script src="auth-guard.js"></script>
    <script>
        const API_URL = 'http://localhost:3009/api/p4p';
        let allData = [];

        // =====================================
        // Edit p4p_doctor_point
        // =====================================
        function openEditModal(icode, point, istatus) {
            document.getElementById('editIcode').value = icode;
            document.getElementById('editPoint').value = parseFloat(point) || 0;
            document.getElementById('editIstatus').value = istatus || 'Y';
            document.getElementById('editIcodeLabel').textContent = icode;
            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('editModal').classList.add('flex');
            document.getElementById('editPoint').focus();
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');
        }

        async function saveEdit() {
            const icode   = document.getElementById('editIcode').value;
            const point   = parseFloat(document.getElementById('editPoint').value);
            const istatus = document.getElementById('editIstatus').value;

            if (isNaN(point)) { alert('กรุณากรอก Point เป็นตัวเลข'); return; }

            const btn = document.getElementById('saveEditBtn');
            btn.disabled = true;
            btn.textContent = 'กำลังบันทึก...';

            try {
                const token = sessionStorage.getItem('p4p_token') || '';
                const res = await fetch(`${API_URL}/p4p-doctor-point/${icode}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ point, istatus })
                });
                const result = await res.json();
                if (result.success) {
                    closeEditModal();
                    loadData(); // reload table
                } else {
                    alert('เกิดข้อผิดพลาด: ' + result.error);
                }
            } catch (err) {
                alert('ไม่สามารถบันทึกได้: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'บันทึก';
            }
        }

        // =====================================
        // Log modal
        // =====================================
        async function openLogModal(icode) {
            document.getElementById('logModal').classList.remove('hidden');
            document.getElementById('logModal').classList.add('flex');
            document.getElementById('logIcodeLabel').textContent = icode;
            document.getElementById('logContent').innerHTML =
                '<p class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i>กำลังโหลด...</p>';

            try {
                const res = await fetch(`${API_URL}/p4p-doctor-point/${icode}/logs`);
                const result = await res.json();
                if (result.success && result.data.length > 0) {
                    document.getElementById('logContent').innerHTML = `
                        <table class="min-w-full text-sm divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-3 py-2 text-left text-xs font-bold text-gray-600">วันที่-เวลา</th>
                                    <th class="px-3 py-2 text-right text-xs font-bold text-gray-600">Point เดิม</th>
                                    <th class="px-3 py-2 text-right text-xs font-bold text-gray-600">Point ใหม่</th>
                                    <th class="px-3 py-2 text-center text-xs font-bold text-gray-600">ผู้แก้ไข</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                ${result.data.map((log, i) => `
                                    <tr class="${i === 0 ? 'bg-yellow-50' : 'bg-white'} hover:bg-gray-50">
                                        <td class="px-3 py-2 text-gray-600 text-xs">
                                            ${new Date(log.update_datetime).toLocaleString('th-TH')}
                                        </td>
                                        <td class="px-3 py-2 text-right text-red-600 font-semibold">
                                            ${log.point_old !== null ? parseFloat(log.point_old).toFixed(2) : '-'}
                                        </td>
                                        <td class="px-3 py-2 text-right text-green-600 font-semibold">
                                            ${log.point_new !== null ? parseFloat(log.point_new).toFixed(2) : '-'}
                                        </td>
                                        <td class="px-3 py-2 text-center text-gray-700">
                                            <i class="fas fa-user text-xs mr-1 text-gray-400"></i>
                                            ${log.officer_name || 'system'}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>`;
                } else {
                    document.getElementById('logContent').innerHTML =
                        '<p class="text-center py-8 text-gray-400">ไม่พบประวัติการแก้ไข</p>';
                }
            } catch (err) {
                document.getElementById('logContent').innerHTML =
                    '<p class="text-center py-8 text-red-400">เกิดข้อผิดพลาด: ' + err.message + '</p>';
            }
        }

        function closeLogModal() {
            document.getElementById('logModal').classList.add('hidden');
            document.getElementById('logModal').classList.remove('flex');
        }

        // =====================================
        // Load Income Filter (จากตาราง income ในฐานข้อมูล)
        // =====================================
        async function loadIncomeList() {
            const select = document.getElementById('incomeFilter');
            select.innerHTML = '<option value="">⏳ กำลังโหลด...</option>';
            select.disabled = true;
            try {
                const res = await fetch(`${API_URL}/income-filter-list`);
                const result = await res.json();
                select.innerHTML = '<option value="">-- แสดงทั้งหมด --</option>';
                if (result.success && result.data.length > 0) {
                    result.data.forEach(item => {
                        const opt = document.createElement('option');
                        opt.value = item.income;
                        const count = parseInt(item.imported_count) || 0;
                        opt.textContent = count > 0
                            ? `${item.income_name || item.income} (${item.income}) — ${count} รายการ`
                            : `${item.income_name || item.income} (${item.income})`;
                        select.appendChild(opt);
                    });
                } else if (!result.success) {
                    select.innerHTML = `<option value="">⚠️ Error: ${result.error}</option>`;
                }
            } catch (err) {
                console.error('Error loading income list:', err);
                select.innerHTML = '<option value="">❌ ไม่สามารถโหลดข้อมูลได้</option>';
            } finally {
                select.disabled = false;
            }
        }

        // =====================================
        // Load Data
        // =====================================
        async function loadData() {
            const income = document.getElementById('incomeFilter').value;
            const section = document.getElementById('dataSection');

            section.innerHTML = `
                <div class="text-center py-16 text-gray-400">
                    <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
                    <p>กำลังโหลดข้อมูล...</p>
                </div>`;

            try {
                const url = income
                    ? `${API_URL}/p4p-doctor-point?income=${encodeURIComponent(income)}`
                    : `${API_URL}/p4p-doctor-point`;

                const res = await fetch(url);
                const result = await res.json();

                if (!result.success) throw new Error(result.error);

                allData = result.data;
                renderTable(result.data, income);

            } catch (err) {
                section.innerHTML = `
                    <div class="text-center py-16 text-red-400">
                        <i class="fas fa-times-circle text-4xl mb-4"></i>
                        <p>เกิดข้อผิดพลาด: ${err.message}</p>
                    </div>`;
            }
        }

        // =====================================
        // Render Table
        // =====================================
        function renderTable(data, incomeFilter) {
            const section = document.getElementById('dataSection');

            if (data.length === 0) {
                section.innerHTML = `
                    <div class="text-center py-16 text-gray-400">
                        <i class="fas fa-inbox text-4xl mb-4"></i>
                        <p>ไม่พบข้อมูล</p>
                    </div>`;
                return;
            }

            const totalPoint = data.reduce((s, r) => s + (parseFloat(r.point) || 0), 0);
            const incomeName = incomeFilter
                ? (data[0]?.income_name || incomeFilter)
                : 'ทั้งหมด';

            section.innerHTML = `
                <div class="flex items-center justify-between mb-4">
                    <div class="bg-purple-50 border-l-4 border-purple-500 px-4 py-3 rounded-r-lg flex-1 mr-4">
                        <p class="text-sm text-purple-800 font-semibold">
                            <i class="fas fa-info-circle mr-2"></i>
                            Income: <span class="text-purple-900">${incomeName}</span>
                            &nbsp;|&nbsp; จำนวน: <span class="font-bold">${data.length.toLocaleString()}</span> รายการ
                            &nbsp;|&nbsp; Point รวม: <span class="font-bold">${totalPoint.toFixed(2)}</span>
                        </p>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 text-sm">
                        <thead class="bg-gradient-to-r from-purple-50 to-purple-100">
                            <tr>
                                <th class="px-3 py-3 text-center text-xs font-bold text-gray-600 uppercase w-12">ลำดับ</th>
                                <th class="px-3 py-3 text-left text-xs font-bold text-gray-600 uppercase">รหัส (icode)</th>
                                <th class="px-3 py-3 text-left text-xs font-bold text-gray-600 uppercase">ชื่อรายการ</th>
                                <th class="px-3 py-3 text-left text-xs font-bold text-gray-600 uppercase">Income</th>
                                <th class="px-3 py-3 text-left text-xs font-bold text-gray-600 uppercase">Income Name</th>
                                <th class="px-3 py-3 text-right text-xs font-bold text-gray-600 uppercase">Point</th>
                                <th class="px-3 py-3 text-center text-xs font-bold text-gray-600 uppercase">สถานะ</th>
                                <th class="px-3 py-3 text-center text-xs font-bold text-gray-600 uppercase">วันที่อัปเดต</th>
                                <th class="px-3 py-3 text-center text-xs font-bold text-gray-600 uppercase">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-100">
                            ${data.map((item, i) => `
                                <tr class="hover:bg-purple-50 transition duration-100">
                                    <td class="px-3 py-2.5 text-center text-gray-500">${i + 1}</td>
                                    <td class="px-3 py-2.5 font-mono text-purple-700 font-semibold">${item.icode || '-'}</td>
                                    <td class="px-3 py-2.5 text-gray-700">${item.item_name || '-'}</td>
                                    <td class="px-3 py-2.5 text-gray-600">${item.income || '-'}</td>
                                    <td class="px-3 py-2.5 text-gray-600">${item.income_name || '-'}</td>
                                    <td class="px-3 py-2.5 text-right font-semibold text-gray-800">${item.point !== null ? parseFloat(item.point).toFixed(2) : '0.00'}</td>
                                    <td class="px-3 py-2.5 text-center">
                                        <span class="px-2 py-0.5 rounded-full text-xs font-semibold ${item.istatus === 'Y' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                            ${item.istatus === 'Y' ? 'Active' : 'Inactive'}
                                        </span>
                                    </td>
                                    <td class="px-3 py-2.5 text-center text-gray-500 text-xs">
                                        ${item.update_datetime ? new Date(item.update_datetime).toLocaleString('th-TH') : '-'}
                                    </td>
                                    <td class="px-3 py-2.5 text-center">
                                        <div class="flex items-center justify-center space-x-1">
                                            <button onclick="openEditModal('${item.icode}', ${item.point || 0}, '${item.istatus || 'Y'}')"
                                                class="bg-blue-500 hover:bg-blue-600 text-white px-2 py-1 rounded text-xs">
                                                <i class="fas fa-edit mr-1"></i>แก้ไข
                                            </button>
                                            <button onclick="openLogModal('${item.icode}')"
                                                class="bg-amber-500 hover:bg-amber-600 text-white px-2 py-1 rounded text-xs">
                                                <i class="fas fa-history mr-1"></i>Log
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                        <tfoot class="bg-gray-50">
                            <tr>
                                <td colspan="5" class="px-3 py-3 text-right text-sm font-bold text-gray-700">รวมทั้งหมด:</td>
                                <td class="px-3 py-3 text-right text-sm font-bold text-purple-700">${totalPoint.toFixed(2)}</td>
                                <td colspan="3" class="px-3 py-3 text-center text-sm text-gray-500">${data.length.toLocaleString()} รายการ</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>`;
        }

        // =====================================
        // Export CSV
        // =====================================
        function exportCSV() {
            if (allData.length === 0) {
                alert('ไม่มีข้อมูลสำหรับ Export');
                return;
            }
            let csv = '\uFEFF';
            csv += 'ลำดับ,รหัส (icode),ชื่อรายการ,Income,Income Name,Point,สถานะ,วันที่อัปเดต\n';
            allData.forEach((item, i) => {
                csv += `${i + 1},"${item.icode || ''}","${item.item_name || ''}","${item.income || ''}","${item.income_name || ''}",${item.point || 0},"${item.istatus || ''}","${item.update_datetime ? new Date(item.update_datetime).toLocaleString('th-TH') : ''}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            const income = document.getElementById('incomeFilter').value;
            link.download = `p4p_doctor_point${income ? '_' + income : ''}_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        // =====================================
        // Init
        // =====================================
        document.addEventListener('DOMContentLoaded', async () => {
            const officer = await requireAuth();
            if (officer) renderUserBar(officer);
            await loadIncomeList();
            // ไม่โหลดข้อมูลอัตโนมัติ — รอให้กดปุ่มค้นหาก่อน
            document.getElementById('dataSection').innerHTML = `
                <div class="text-center py-16 text-gray-400">
                    <i class="fas fa-search text-5xl mb-4 opacity-30"></i>
                    <p class="text-lg">เลือก Income แล้วกดปุ่ม <strong>ค้นหา</strong> เพื่อแสดงข้อมูล</p>
                    <p class="text-sm mt-2 opacity-60">หรือกดค้นหาโดยไม่เลือก Income เพื่อแสดงทั้งหมด</p>
                </div>`;
        });
    </script>
</body>
</html>
