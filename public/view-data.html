<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงาน P4P - P4P System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        @media print {
            header, footer, #filterCard, #exportBtn, #userBar { display: none !important; }
            #printHeader { display: block !important; }
            body { background: white; }
        }
        #printHeader { display: none; }
        /* Searchable doctor dropdown */
        #doctorDropdown { scrollbar-width: thin; }
        #doctorDropdown::-webkit-scrollbar { width: 5px; }
        #doctorDropdown::-webkit-scrollbar-thumb { background: #99f6e4; border-radius: 4px; }
        .doctor-option { padding: 8px 12px; cursor: pointer; font-size: 0.875rem; transition: background 0.1s; }
        .doctor-option:hover, .doctor-option.active { background: #f0fdf4; color: #0f766e; }
        .doctor-option.selected-opt { background: #ccfbf1; color: #0f766e; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <header class="bg-gradient-to-r from-teal-600 to-teal-800 text-white shadow-lg">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <a href="index.html" class="bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-3 py-2 rounded-lg transition text-sm">
                    <i class="fas fa-arrow-left mr-1"></i>หน้าแรก
                </a>
                <div>
                    <div class="flex items-center gap-3">
                        <h1 class="text-2xl font-bold"><i class="fas fa-chart-bar mr-2"></i>รายงาน P4P</h1>
                        <span id="groupBadge" class="hidden bg-white bg-opacity-20 text-white text-xs px-3 py-1 rounded-full border border-white border-opacity-30 font-medium"></span>
                    </div>
                    <p class="text-teal-200 text-sm mt-0.5">รายงานการให้บริการตามรายการ P4P</p>
                </div>
            </div>
            <div id="userBar" class="hidden"></div>
        </div>
    </header>

    <main class="flex-1 container mx-auto px-6 py-6 max-w-7xl">

        <div id="alert" class="hidden mb-4"></div>

        <!-- Filter Card -->
        <div id="filterCard" class="bg-white rounded-xl shadow-md p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-700 mb-4"><i class="fas fa-filter text-teal-500 mr-2"></i>เงื่อนไขการค้นหา</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

                <!-- วันที่เริ่มต้น -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        <i class="fas fa-calendar text-teal-500 mr-1"></i>วันที่เริ่มต้น
                    </label>
                    <input id="dateFrom" type="date"
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 text-sm">
                </div>

                <!-- วันที่สิ้นสุด -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        <i class="fas fa-calendar-check text-teal-500 mr-1"></i>วันที่สิ้นสุด
                    </label>
                    <input id="dateTo" type="date"
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 text-sm">
                </div>

                <!-- แพทย์ (searchable) -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        <i class="fas fa-user-md text-teal-500 mr-1"></i>แพทย์ผู้ตรวจ
                    </label>
                    <div class="relative" id="doctorDropdownWrap">
                        <input id="doctorSearchInput" type="text" placeholder="-- แพทย์ทุกคน --"
                            autocomplete="off"
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 text-sm pr-8"
                            oninput="filterDoctorDropdown(this.value)"
                            onfocus="openDoctorDropdown()">
                        <button id="clearDoctorBtn" onclick="clearDoctorSelect()"
                            class="hidden absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-times text-xs"></i>
                        </button>
                        <div id="doctorDropdown" class="hidden absolute z-30 w-full bg-white border border-gray-200 rounded-lg shadow-xl mt-1 max-h-56 overflow-y-auto"></div>
                    </div>
                </div>

                <!-- Income -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        <i class="fas fa-tag text-teal-500 mr-1"></i>Income
                    </label>
                    <select id="incomeSelect"
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 text-sm">
                        <option value="">-- แสดงทั้งหมด --</option>
                    </select>
                </div>

            </div>

            <div class="mt-4 flex items-center space-x-3">
                <button onclick="loadReport()"
                    class="bg-teal-600 hover:bg-teal-700 text-white font-semibold px-6 py-2.5 rounded-lg transition flex items-center space-x-2">
                    <i class="fas fa-search"></i><span>ค้นหา</span>
                </button>
                <button id="exportBtn" onclick="exportCSV()" class="hidden bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-2.5 rounded-lg transition flex items-center space-x-2">
                    <i class="fas fa-file-csv"></i><span>Export CSV</span>
                </button>
                <button onclick="window.print()" class="bg-gray-600 hover:bg-gray-700 text-white font-semibold px-6 py-2.5 rounded-lg transition flex items-center space-x-2">
                    <i class="fas fa-print"></i><span>พิมพ์</span>
                </button>
            </div>
        </div>

        <!-- Report Area -->
        <div class="bg-white rounded-xl shadow-md p-6">

            <!-- Print Header -->
            <div id="printHeader" class="mb-6 text-center border-b pb-4">
                <h2 class="text-xl font-bold" id="printTitle">รายงาน P4P</h2>
                <p id="printSubtitle" class="text-gray-600 text-sm mt-1"></p>
            </div>

            <!-- Report Title (on screen) -->
            <div id="reportTitle" class="hidden mb-4">
                <div class="bg-teal-50 border-l-4 border-teal-500 px-4 py-3 rounded-r-lg">
                    <p class="font-bold text-teal-900 text-lg" id="doctorTitle"></p>
                    <p class="text-teal-700 text-sm" id="reportSubtitle"></p>
                </div>
            </div>

            <div id="dataSection">
                <div class="text-center py-16 text-gray-400">
                    <i class="fas fa-search text-5xl mb-4 opacity-30"></i>
                    <p class="text-lg">กรอกเงื่อนไขแล้วกดปุ่ม <strong>ค้นหา</strong></p>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-gray-800 text-white text-center py-4 mt-8">
        <p class="text-sm">P4P Management System v1.0 | โรงพยาบาลพุทธชินราช</p>
    </footer>

    <script src="auth-guard.js"></script>
    <script src="view-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const officer = await requireAuth();
            if (officer) renderUserBar(officer);
        });
    </script>
</body>
</html>
