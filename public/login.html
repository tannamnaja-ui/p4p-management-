<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ P4P - สำหรับการคิดคะแนน P4P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .bg-hospital {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 50%, #1d4ed8 100%);
        }
        .login-card { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-hospital min-h-screen flex flex-col items-center justify-center px-4">

    <!-- Logo / Header -->
    <div class="text-center mb-8 text-white">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-white bg-opacity-20 rounded-full mb-4">
            <i class="fas fa-hospital text-4xl"></i>
        </div>
        <h1 class="text-3xl font-bold">ระบบ P4P</h1>
        <p class="text-blue-200 mt-1 text-sm">Pay for Performance Management System</p>
        <p class="text-blue-100 text-sm font-semibold mt-0.5">สำหรับการคิดคะแนน P4P</p>
    </div>

    <!-- LOGIN VIEW -->
    <div id="loginView" class="login-card bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 relative">

        <button type="button" onclick="openSettings()" title="ตั้งค่าการเชื่อมต่อ"
            class="absolute top-5 right-5 text-gray-400 hover:text-blue-600 transition">
            <i class="fas fa-cog text-xl"></i>
        </button>

        <h2 class="text-xl font-bold text-gray-800 mb-1 text-center">เข้าสู่ระบบ</h2>
        <p class="text-gray-400 text-sm text-center mb-6">กรอก Username และ Password ของท่าน</p>

        <!-- Alert -->
        <div id="alert" class="hidden mb-4"></div>

        <!-- Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    <i class="fas fa-user text-blue-500 mr-1"></i>Username
                </label>
                <input id="username" type="text" placeholder="Username" autocomplete="username"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    <i class="fas fa-lock text-blue-500 mr-1"></i>Password
                </label>
                <input id="password" type="password" placeholder="Password" autocomplete="current-password"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    <i class="fas fa-door-open text-blue-500 mr-1"></i>ห้องทำงาน
                </label>
                <select id="department" onchange="onDepartmentChange()"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition bg-white">
                    <option value="">-- เลือกห้องทำงาน --</option>
                </select>
            </div>

            <button type="submit" id="loginBtn"
                class="w-full bg-blue-700 hover:bg-blue-800 active:bg-blue-900 text-white font-bold py-3 px-6 rounded-xl transition duration-200 text-sm">
                <i class="fas fa-sign-in-alt mr-2"></i>เข้าสู่ระบบ
            </button>
        </form>
    </div>

    <!-- CONNECTION SETTINGS VIEW -->
    <div id="settingsView" class="hidden login-card bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">

        <h2 class="text-xl font-bold text-gray-800 mb-1 text-center">ตั้งค่าการเชื่อมต่อฐานข้อมูล</h2>
        <p class="text-gray-400 text-sm text-center mb-6">เลือกประเภทฐานข้อมูลและกรอกข้อมูลเชื่อมต่อ</p>

        <div id="settingsAlert" class="hidden mb-4"></div>

        <div class="mb-4">
            <label class="block text-sm font-semibold text-gray-700 mb-1">ประเภทฐานข้อมูล</label>
            <select id="dbType" onchange="onDbTypeChange()"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition bg-white">
                <option value="postgresql">PostgreSQL</option>
                <option value="mysql">MySQL</option>
            </select>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-4">
            <div class="col-span-2">
                <label class="block text-sm font-semibold text-gray-700 mb-1">IP Server</label>
                <input id="dbHost" type="text" placeholder="192.168.x.x"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Port</label>
                <input id="dbPort" type="text" placeholder="5432"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
            </div>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-semibold text-gray-700 mb-1">Database</label>
            <input id="dbName" type="text" placeholder="ชื่อฐานข้อมูล"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
            <input id="dbUser" type="text" autocomplete="off" placeholder="Database Username"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
        </div>

        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
            <input id="dbPassword" type="password" autocomplete="off" placeholder="Database Password"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
        </div>

        <div class="flex gap-3 mb-3">
            <button type="button" onclick="testConnection()" id="testBtn"
                class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3 px-4 rounded-xl transition text-sm">
                <i class="fas fa-plug mr-2"></i>ทดสอบการเชื่อมต่อ
            </button>
            <button type="button" onclick="saveConnection()" id="saveBtn"
                class="flex-1 bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 px-4 rounded-xl transition text-sm">
                <i class="fas fa-save mr-2"></i>บันทึกข้อมูลเชื่อมต่อ
            </button>
        </div>

        <div id="tablesStatus" class="mb-3 text-xs text-gray-600 space-y-1"></div>

        <button type="button" onclick="createTables()" id="createTablesBtn" disabled
            class="w-full bg-gray-300 text-gray-500 font-semibold py-3 px-4 rounded-xl transition text-sm mb-3 cursor-not-allowed">
            <i class="fas fa-table mr-2"></i>เพิ่มตาราง
        </button>

        <button type="button" onclick="closeSettings()"
            class="w-full text-gray-400 hover:text-gray-600 text-sm font-medium py-2 transition">
            <i class="fas fa-arrow-left mr-1"></i>กลับไปหน้าเข้าสู่ระบบ
        </button>
    </div>

    <p class="text-blue-300 text-xs mt-6">P4P Management System v1.0</p>

    <script src="login.js"></script>
</body>
</html>
