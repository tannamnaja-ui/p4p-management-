<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ P4P - สำหรับการคิดคะแนน P4P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .bg-hospital {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 50%, #1d4ed8 100%);
        }
        .login-card { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-hospital min-h-screen flex flex-col items-center justify-center px-4">

    <!-- Logo / Header -->
    <div class="text-center mb-8 text-white">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-white bg-opacity-20 rounded-full mb-4">
            <i class="fas fa-hospital text-4xl"></i>
        </div>
        <h1 class="text-3xl font-bold">ระบบ P4P</h1>
        <p class="text-blue-200 mt-1 text-sm">Pay for Performance Management System</p>
        <p class="text-blue-100 text-sm font-semibold mt-0.5">สำหรับการคิดคะแนน P4P</p>
    </div>

    <!-- Login Card -->
    <div class="login-card bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">

        <!-- Auto-login state (แสดงขณะตรวจสอบ code จาก URL) -->
        <div id="autoLoginState" class="hidden text-center py-6">
            <i class="fas fa-spinner fa-spin text-blue-500 text-3xl mb-3"></i>
            <p class="text-gray-700 font-semibold text-lg">กำลังตรวจสอบ BMS Session...</p>
            <p class="text-gray-400 text-sm mt-1">กรุณารอสักครู่</p>
        </div>

        <!-- Manual input state -->
        <div id="manualState">
            <h2 class="text-xl font-bold text-gray-800 mb-1 text-center">เข้าสู่ระบบด้วย BMS</h2>
            <p class="text-gray-400 text-sm text-center mb-6">กรอก Session Code จากระบบ HOSxP</p>

            <!-- Alert -->
            <div id="alert" class="hidden mb-4"></div>

            <!-- Form -->
            <form id="loginForm" onsubmit="handleBmsLogin(event)">
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        <i class="fas fa-key text-blue-500 mr-1"></i>BMS Session Code
                    </label>
                    <input id="sessionCode" type="text" placeholder="กรอก Session Code จาก HOSxP"
                        autocomplete="off"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition font-mono">
                    <p class="text-gray-400 text-xs mt-1.5">
                        <i class="fas fa-info-circle mr-1"></i>รับ code จากระบบ HOSxP ผ่าน PasteJSON
                    </p>
                </div>

                <button type="submit" id="loginBtn"
                    class="w-full bg-blue-700 hover:bg-blue-800 active:bg-blue-900 text-white font-bold py-3 px-6 rounded-xl transition duration-200 text-sm">
                    <i class="fas fa-sign-in-alt mr-2"></i>เข้าสู่ระบบ
                </button>
            </form>
        </div>

    </div>

    <p class="text-blue-300 text-xs mt-6">P4P Management System v1.0 · BMS HOSxP Session</p>

    <script src="login.js"></script>
</body>
</html>
